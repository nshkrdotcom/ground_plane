<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">GroundPlane Persistence Policy</title>
  <desc id="desc">A balanced hexagonal policy shield governing layered persistence tiers.</desc>
  <defs>
    <clipPath id="hex-clip">
      <polygon points="100,6 181,53 181,147 100,194 19,147 19,53" />
    </clipPath>
    <linearGradient id="field" x1="28" y1="25" x2="172" y2="177" gradientUnits="userSpaceOnUse">
      <stop stop-color="#052e2b" />
      <stop offset="0.52" stop-color="#12354b" />
      <stop offset="1" stop-color="#312e5a" />
    </linearGradient>
    <linearGradient id="edge" x1="24" y1="34" x2="176" y2="166" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf" />
      <stop offset="0.52" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="shield" x1="76" y1="65" x2="126" y2="139" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14b8a6" />
      <stop offset="1" stop-color="#4338ca" />
    </linearGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#99f6e4" fill-opacity="0.1" />
    </pattern>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#hex-clip)">
    <polygon points="100,6 181,53 181,147 100,194 19,147 19,53" fill="url(#field)" />
    <path d="M0 0H200V200H0Z" fill="url(#dots)" />
    <circle cx="100" cy="101" r="67" fill="none" stroke="#5eead4" stroke-opacity="0.11" />

    <g fill="#061a20" stroke-width="1.5">
      <path d="M44 62C44 56 56 52 69 52C82 52 94 56 94 62V76C94 82 82 86 69 86C56 86 44 82 44 76Z" stroke="#2dd4bf" />
      <ellipse cx="69" cy="62" rx="25" ry="10" fill="#0f3b3d" stroke="#5eead4" />
      <path d="M106 62C106 56 118 52 131 52C144 52 156 56 156 62V76C156 82 144 86 131 86C118 86 106 82 106 76Z" stroke="#818cf8" />
      <ellipse cx="131" cy="62" rx="25" ry="10" fill="#232854" stroke="#a5b4fc" />
      <path d="M44 132C44 126 56 122 69 122C82 122 94 126 94 132V146C94 152 82 156 69 156C56 156 44 152 44 146Z" stroke="#38bdf8" />
      <ellipse cx="69" cy="132" rx="25" ry="10" fill="#113b52" stroke="#7dd3fc" />
      <path d="M106 132C106 126 118 122 131 122C144 122 156 126 156 132V146C156 152 144 156 131 156C118 156 106 152 106 146Z" stroke="#8b5cf6" />
      <ellipse cx="131" cy="132" rx="25" ry="10" fill="#33265c" stroke="#c4b5fd" />
    </g>

    <g stroke="url(#edge)" stroke-width="1.7" stroke-linecap="round" opacity="0.72">
      <path d="M83 72L91 83M117 72L109 83M83 136L91 124M117 136L109 124" />
      <path d="M69 91V112M131 91V112" stroke-dasharray="3 4" />
    </g>

    <g filter="url(#glow)">
      <path d="M100 68L128 79V100C128 119 117 134 100 142C83 134 72 119 72 100V79Z" fill="url(#shield)" stroke="#ccfbf1" stroke-width="2" />
      <path d="M100 76L120 84V100C120 113 113 124 100 131C87 124 80 113 80 100V84Z" fill="#071c2b" fill-opacity="0.78" stroke="#67e8f9" stroke-opacity="0.55" />
      <path d="M89 101L97 109L113 91" fill="none" stroke="#f0fdfa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <g fill="#ccfbf1">
      <circle cx="69" cy="62" r="2" /><circle cx="131" cy="62" r="2" />
      <circle cx="69" cy="132" r="2" /><circle cx="131" cy="132" r="2" />
    </g>
  </g>

  <polygon points="100,6 181,53 181,147 100,194 19,147 19,53" fill="none" stroke="url(#edge)" stroke-width="3" stroke-linejoin="round" />
  <polygon points="100,14 174,57 174,143 100,186 26,143 26,57" fill="none" stroke="#d1fae5" stroke-opacity="0.2" />
</svg>
